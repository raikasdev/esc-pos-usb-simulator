<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual ESC/POS Printer</title>
    <link rel="stylesheet" href="./printer.css" />
  </head>
  <body>
    <div class="stage">
      <header class="toolbar">
        <div class="status" id="status" role="status" aria-live="polite">
          <span class="status__dot" aria-hidden="true"></span>
          <span id="statusText">connecting&hellip;</span>
        </div>
        <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M11 5 6.8 8.5H3.5v7h3.3L11 19V5Z" />
            <path d="M15.2 9.2a4 4 0 0 1 0 5.6m2.7-8.3a7.5 7.5 0 0 1 0 11" />
          </svg>
          <span>Sound on</span>
        </button>
      </header>

      <main class="printer-scene">
        <div class="printer" aria-label="Receipt printer">
          <div class="printer__top">
            <div class="printer__lid-line"></div>
          </div>
          <div class="printer__body">
            <div class="printer__brand">ESC/POS</div>
            <div class="printer__controls">
              <div class="printer__led" id="led"></div>
              <span>Power</span>
            </div>
          </div>
          <div class="printer__slot"></div>
          <div class="printer__drawer" id="drawer"></div>
        </div>

        <div class="feed" id="feed" aria-live="polite"></div>
      </main>

      <div class="receipt-desk" id="receiptDesk"></div>
      <p class="hint" id="hint">Printed receipts stay here · drag to arrange</p>
    </div>

    <audio id="printerSound" src="./assets/receipt-printer.wav" preload="auto"></audio>
    <audio id="cutterSound" src="./assets/receipt-cutter.wav" preload="auto"></audio>
    <script type="module" src="./printer.ts"></script>
  </body>
</html>
